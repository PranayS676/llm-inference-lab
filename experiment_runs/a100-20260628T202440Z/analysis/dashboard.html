<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A100 Official Benchmark Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #64748b;
      --border: #d7dce5;
      --accent: #1f7a8c;
      --accent-2: #8a5a44;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 28px 36px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: 0;
    }
    p { color: var(--muted); margin: 0; }
    main { padding: 24px 36px 40px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .card .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .card .value {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 700;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    label { font-size: 13px; color: var(--muted); }
    select {
      min-width: 220px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .panel {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .panel.full { grid-column: 1 / -1; }
    .chart { width: 100%; height: 420px; }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th {
      position: sticky;
      top: 0;
      background: #eef2f7;
      color: #334155;
      z-index: 1;
    }
    @media (max-width: 980px) {
      header, main { padding-left: 18px; padding-right: 18px; }
      .grid { grid-template-columns: 1fr; }
      .chart { height: 360px; }
    }
  </style>
</head>

    function fmt(value, digits = 2) {

    function groupBy(rows, keyFn) {
      const map = new Map();
      rows.forEach(row => {

        Number(a.concurrency ?? 0) - Number(b.concurrency ?? 0)

    function lineTraces(rows, metric) {
      const groups = groupBy(sortedRows(rows), row => row.series_label);
      return [...groups.entries()].map(([name, values]) => ({
        type: "scatter",
        mode: "lines+markers",
        name,
        x: values.map(row => row.concurrency),
        y: values.map(row => row[metric]),
        customdata: values.map(row => [row.p50_latency_ms, row.p95_latency_ms, row.requests_per_second, row.avg_ttft_ms, row.avg_tokens_per_second]),
        hovertemplate:
          "<b>%{fullData.name}</b><br>Concurrency: %{x}<br>Metric: %{y:.3f}" +
